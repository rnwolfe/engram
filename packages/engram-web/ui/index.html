<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>engram — knowledge graph</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header id="toolbar">
      <span id="brand">engram</span>
      <span id="stats-display">Loading…</span>
      <div id="search-container">
        <input id="search-input" type="text" placeholder="Search entities… (/)" autocomplete="off" />
        <div id="search-dropdown" class="hidden"></div>
      </div>
      <div id="toolbar-actions">
        <button id="btn-sidebar-toggle" title="Toggle filter sidebar" aria-label="Toggle filter sidebar" aria-expanded="false">☰</button>
        <button id="btn-fit" title="Zoom to fit">Zoom to fit</button>
        <button id="btn-reset-layout" title="Reset layout">Reset layout</button>
        <button id="btn-decay-overlay" class="btn">Decay overlay</button>
      </div>
    </header>
    <div id="decay-summary" class="hidden"></div>

    <div id="app">
      <!-- Main content: filter sidebar + graph canvas + detail panel -->
      <div id="main-content">
        <div id="sidebar-backdrop" class="hidden" aria-hidden="true"></div>
        <aside id="filter-sidebar"></aside>
        <div id="cy"></div>
        <aside id="detail-panel" class="panel hidden">
          <button id="panel-close" aria-label="Close panel">×</button>
          <div id="panel-content"></div>
        </aside>
      </div>
    </div>

    <div id="legend">
      <strong>Types</strong>
      <div id="legend-items"></div>
    </div>

    <div id="time-slider-container">
      <input id="time-slider" type="range" />
      <span id="time-label">Now</span>
      <button id="btn-now">Now</button>
    </div>

    <div id="loading" class="hidden">
      <p>Loading…</p>
    </div>
    <div id="error-banner"></div>
    <script type="module" src="main.js"></script>
  </body>
</html>
