<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>engram — knowledge graph</title>
    <link rel="stylesheet" href="/main.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header id="header">
        <h1>engram</h1>
        <div id="stats-bar">
          <span id="stat-entities">
            <span class="stat-value">—</span> entities
          </span>
          <span id="stat-edges">
            <span class="stat-value">—</span> edges
          </span>
        </div>
        <div id="search-container">
          <input id="search-input" type="text" placeholder="Search entities… (/)" autocomplete="off" />
          <div id="search-dropdown" class="hidden"></div>
        </div>
        <div class="toolbar-group">
          <button id="btn-fit" class="btn" title="Zoom to fit all nodes">Zoom to fit</button>
          <button id="btn-reset-layout" class="btn" title="Re-run force-directed layout">Reset layout</button>
        </div>
      </header>

      <!-- Main content: filter sidebar + graph canvas -->
      <div id="main-content">
        <aside id="filter-sidebar"></aside>
        <!-- Graph canvas -->
        <div id="cy"></div>
      </div>
    </div>

    <!-- Legend (fixed, top-right) -->
    <aside id="legend">
      <h3>Entity types</h3>
      <div id="legend-items"></div>
    </aside>

    <!-- Loading overlay -->
    <div id="loading">
      <p>Loading…</p>
    </div>

    <!-- Error banner -->
    <div id="error-banner"></div>

    <script src="/main.js" type="module"></script>
  </body>
</html>
