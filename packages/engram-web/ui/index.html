<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>engram — knowledge graph</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header id="toolbar">
      <span id="brand">engram</span>
      <span id="stats-display">Loading…</span>
      <div id="toolbar-actions">
        <button id="btn-zoom-fit" title="Zoom to fit">Zoom to fit</button>
        <button id="btn-reset-layout" title="Reset layout">Reset layout</button>
      </div>
    </header>

    <div id="app">
      <div id="cy"></div>

      <aside id="detail-panel" class="panel hidden">
        <button id="panel-close" aria-label="Close panel">×</button>
        <div id="panel-content"></div>
      </aside>
    </div>

    <div id="legend">
      <strong>Types</strong>
      <div id="legend-items"></div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
